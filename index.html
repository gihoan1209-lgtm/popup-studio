<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="referrer" content="no-referrer" />
    <title>Popup Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="editor-panel" aria-label="팝업 편집">
        <div class="brand-row">
          <div>
            <p class="eyebrow">Popup Studio</p>
            <h1>팝업 템플릿 편집기</h1>
          </div>
          <button class="icon-button" id="resetButton" type="button" title="초기화" aria-label="초기화">
            <span aria-hidden="true">↺</span>
          </button>
        </div>

        <div class="editor-columns">
          <section class="editor-column" data-editor-section="content">
            <div class="editor-section-title">
              <span>기본 내용</span>
              <button class="collapse-button" type="button" data-toggle-section="content">&lt;&lt; 접기</button>
            </div>

            <div class="control-grid tab-panel active" data-panel="content">
              <label class="wide">
                템플릿
                <select id="templateType">
                  <option value="migration">사이트 이전 안내</option>
                  <option value="holidayCalendar">휴무 일정 캘린더</option>
                  <option value="detailChange">상세페이지 변경 안내</option>
                  <option value="productStop">판매중단 공지</option>
                  <option value="holidayList">휴무일 목록 안내</option>
                </select>
              </label>

              <label>
                배지/상단 문구
                <input id="badgeText" type="text" />
              </label>
              <label>
                제목
                <input id="titleText" type="text" />
              </label>
              <label class="wide">
                본문
                <textarea id="bodyText" rows="5"></textarea>
              </label>
              <label>
                하단 안내
                <input id="noteText" type="text" />
              </label>
              <label>
                버튼
                <input id="primaryButton" type="text" />
              </label>

              <div class="wide editor-block" data-template-tools="holidayCalendar">
                <div class="section-title">휴무 캘린더</div>
                <div class="control-grid nested">
                  <label>
                    시작일
                    <input id="calendarStart" type="date" />
                  </label>
                  <label>
                    표시 기간
                    <select id="calendarWeeks">
                      <option value="1">1주</option>
                      <option value="2">2주</option>
                    </select>
                  </label>
                </div>
              </div>

              <div class="wide editor-block" data-template-tools="productStop">
                <div class="section-title">상품 이미지</div>
                <input id="productImageInput" type="file" accept="image/*" />
                <div class="control-grid nested image-controls">
                  <label>
                    이미지 확대
                    <input id="imageZoom" type="range" min="80" max="220" />
                  </label>
                  <label>
                    가로 위치
                    <input id="imageOffsetX" type="range" min="-80" max="80" />
                  </label>
                  <label>
                    세로 위치
                    <input id="imageOffsetY" type="range" min="-80" max="80" />
                  </label>
                  <label>
                    모서리
                    <input id="imageRadius" type="range" min="0" max="50" />
                  </label>
                </div>
                <button id="clearImageButton" class="secondary-action" type="button">이미지 제거</button>
              </div>

              <div class="wide editor-block">
                <div class="section-title">항목</div>
                <div id="infoItemEditor" class="item-editor"></div>
                <button id="addInfoItemButton" class="secondary-action" type="button">항목 추가</button>
              </div>
            </div>
          </section>

          <section class="editor-column" data-editor-section="design">
            <div class="editor-section-title">
              <span>디자인</span>
              <button class="collapse-button" type="button" data-toggle-section="design">&lt;&lt; 접기</button>
            </div>

            <div class="control-grid tab-panel active" data-panel="design">
              <label>
                <span class="field-name">배경색</span>
                <span class="field-map">연결: 팝업 카드 전체 바탕</span>
                <input id="cardBgColor" type="color" />
              </label>
              <label>
                <span class="field-name">보조 배경</span>
                <span class="field-map">연결: 항목 박스/캘린더 표/흰 박스</span>
                <input id="panelBgColor" type="color" />
              </label>
              <label>
                <span class="field-name">강조색</span>
                <span class="field-map">연결: 배지, 테두리, 버튼 시작색</span>
                <input id="accentColor" type="color" />
              </label>
              <label>
                <span class="field-name">보조색</span>
                <span class="field-map">연결: 버튼 끝색, 캘린더 요일 바</span>
                <input id="secondaryColor" type="color" />
              </label>
              <label>
                <span class="field-name">제목 글씨</span>
                <span class="field-map">연결: 기본 내용의 제목</span>
                <input id="titleColor" type="color" />
              </label>
              <label>
                <span class="field-name">본문 글씨</span>
                <span class="field-map">연결: 기본 내용의 본문/배지 글씨</span>
                <input id="bodyColor" type="color" />
              </label>
              <label>
                <span class="field-name">항목 제목</span>
                <span class="field-map">연결: 항목 왼쪽/라벨 글씨</span>
                <input id="itemLabelColor" type="color" />
              </label>
              <label>
                <span class="field-name">항목 내용</span>
                <span class="field-map">연결: 항목 오른쪽/날짜 글씨</span>
                <input id="itemValueColor" type="color" />
              </label>
              <div class="wide editor-block">
                <div class="section-title">항목별 색상/크기</div>
                <div id="itemColorEditor" class="item-color-editor"></div>
              </div>
              <label>
                <span class="field-name">카드 너비</span>
                <span class="field-map">연결: 팝업 카드 가로 크기</span>
                <input id="cardWidth" type="range" min="72" max="96" />
              </label>
              <label>
                <span class="field-name">카드 높이</span>
                <span class="field-map">연결: 팝업 카드 세로 크기</span>
                <input id="cardHeight" type="range" min="72" max="96" />
              </label>
              <label>
                <span class="field-name">모서리</span>
                <span class="field-map">연결: 팝업 카드 둥근 정도</span>
                <input id="cardRadius" type="range" min="0" max="34" />
              </label>
              <label>
                <span class="field-name">내부 여백</span>
                <span class="field-map">연결: 카드 안쪽 전체 간격</span>
                <input id="cardPadding" type="range" min="18" max="58" />
              </label>
              <label>
                <span class="field-name">제목 크기</span>
                <span class="field-map">연결: 기본 내용의 제목</span>
                <input id="titleSize" type="range" min="26" max="68" />
              </label>
              <label>
                <span class="field-name">본문 크기</span>
                <span class="field-map">연결: 본문/하단 안내 기준 크기</span>
                <input id="bodySize" type="range" min="14" max="30" />
              </label>
              <label>
                <span class="field-name">항목 크기</span>
                <span class="field-map">연결: 항목 전체 기본 크기</span>
                <input id="itemSize" type="range" min="13" max="28" />
              </label>
              <label>
                <span class="field-name">이미지 크기</span>
                <span class="field-map">연결: 상품 이미지 영역</span>
                <input id="imageSize" type="range" min="92" max="300" />
              </label>
              <label>
                전체 정렬
                <select id="contentAlign">
                  <option value="center">가운데</option>
                  <option value="left">왼쪽</option>
                </select>
              </label>
              <label>
                항목 정렬
                <select id="itemAlign">
                  <option value="left">왼쪽</option>
                  <option value="center">가운데</option>
                </select>
              </label>
              <label class="check-row">
                <input id="showBadge" type="checkbox" />
                배지 표시
              </label>
              <label class="check-row">
                <input id="showBody" type="checkbox" />
                본문 표시
              </label>
              <label class="check-row">
                <input id="showItems" type="checkbox" />
                항목 표시
              </label>
              <label class="check-row">
                <input id="showNote" type="checkbox" />
                하단 안내 표시
              </label>
              <label class="check-row">
                <input id="showButton" type="checkbox" />
                버튼 표시
              </label>
              <label class="check-row">
                <input id="showImage" type="checkbox" />
                이미지 표시
              </label>
              <label>
                저장 가로(px)
                <input id="exportWidth" type="number" min="100" max="3000" step="10" />
              </label>
              <label>
                저장 세로(px)
                <input id="exportHeight" type="number" min="100" max="3000" step="10" />
              </label>
            </div>
          </section>
        </div>

        <div class="actions">
          <div class="save-box">
            <div class="section-title">작업 저장</div>
            <div class="save-grid">
              <input id="saveNameInput" type="text" placeholder="저장 이름" />
              <button id="saveProjectButton" class="secondary-action" type="button">저장</button>
              <select id="savedProjectSelect" aria-label="저장본 선택"></select>
              <button id="loadProjectButton" class="secondary-action" type="button">불러오기</button>
              <button id="deleteProjectButton" class="secondary-action danger-action" type="button">삭제</button>
            </div>
          </div>
          <button id="downloadButton" class="primary-action" type="button">PNG 저장</button>
        </div>
      </section>

      <section class="preview-panel" aria-label="팝업 미리보기">
        <div class="stage">
          <article id="popupCard" class="popup-card"></article>
        </div>
      </section>
    </main>

    <script src="./vendor/html2canvas.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
